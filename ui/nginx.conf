server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Hashed asset bundles are immutable — cache hard.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # index.html and the runtime config must never be cached, or an operator's
    # WTC_API_BASE_URL change (or a new deploy) would be masked by a stale copy.
    location = /config.js {
        add_header Cache-Control "no-store";
    }
    location = /index.html {
        add_header Cache-Control "no-store";
    }

    # SPA client-side routing: unknown paths fall back to the app shell.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
