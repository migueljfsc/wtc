# Kustomizations for the 'staging' fake cluster.
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: demo-api-staging
  namespace: flux-system
spec:
  interval: 1m
  sourceRef:
    kind: GitRepository
    name: wtc
  path: ./demo/api/infrastructure/overlays/staging
  prune: true
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: demo-web-staging
  namespace: flux-system
spec:
  interval: 1m
  sourceRef:
    kind: GitRepository
    name: wtc
  path: ./demo/web/infrastructure/overlays/staging
  prune: true
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: demo-worker-staging
  namespace: flux-system
spec:
  interval: 1m
  sourceRef:
    kind: GitRepository
    name: wtc
  path: ./demo/worker/infrastructure/overlays/staging
  prune: true
---
apiVersion: notification.toolkit.fluxcd.io/v1beta3
kind: Alert
metadata:
  name: wtc-staging
  namespace: flux-system
spec:
  providerRef:
    name: wtc
  eventSeverity: info
  eventSources:
    - kind: Kustomization
      name: demo-api-staging
    - kind: Kustomization
      name: demo-web-staging
    - kind: Kustomization
      name: demo-worker-staging
  eventMetadata:
    cluster: staging
