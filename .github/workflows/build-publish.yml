name: build-publish

# wtc binary image + version bump. Runs independently of ci.yml (like the
# demo-*.yml and build-publish-ui.yml publishers): on a main push it
# commitizen-bumps the wtc version when wtc's own code changed, then builds and
# pushes the multi-arch image.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    # Skip the redundant re-run our own bump commit triggers. `bump: version …`
    # carries the vX tag, so it can't take [skip ci] without also suppressing
    # release.yml (goreleaser) — guard here instead. The real build already ran
    # on the feature push that produced the bump. (head_commit is absent on
    # workflow_dispatch → guard is false → manual runs still work.)
    if: ${{ !startsWith(github.event.head_commit.message, 'bump:') }}
    permissions:
      contents: write   # commitizen pushes the version bump + tag
      packages: write
    concurrency:
      # Own group per artifact (was the shared `release`): the wtc and ui
      # publishers must never sit in the same group, or GitHub's "one pending
      # per group" rule lets one cancel the other's pending build. Trade-off:
      # a single commit touching BOTH Go and ui makes the two bump-pushes race;
      # cz's push step is continue-on-error so the image still ships, and the
      # skipped tag self-heals on the next push.
      group: release-wtc
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 0   # cz needs history + tags
          # PAT must be the checkout credential (persisted as http.extraheader,
          # which overrides any push-URL token) so the bump bypasses the ruleset.
          token: ${{ secrets.CZ_TOKEN }}

      # Only version wtc when its OWN code/chart changed — not on demo-, ui- or
      # docs-only pushes (this is a monorepo; cz can't scope commits by path).
      - name: detect wtc source changes
        id: changed
        run: |
          base="${{ github.event.before }}"
          if [ -z "$base" ] || [ "$base" = "0000000000000000000000000000000000000000" ]; then
            base="HEAD^"   # first push to the branch: fall back to the tip's parent
          fi
          if git diff --name-only "$base" HEAD | grep -qvE '^(demo/|docs/|ui/|\.github/|.*\.md$)'; then
            echo "wtc=true" >> "$GITHUB_OUTPUT"
          else
            echo "wtc=false — demo/docs/ui only, skipping bump" >> "$GITHUB_STEP_SUMMARY"
            echo "wtc=false" >> "$GITHUB_OUTPUT"
          fi

      - name: bump version
        id: cz
        if: steps.changed.outputs.wtc == 'true'
        uses: commitizen-tools/commitizen-action@0.27.1
        continue-on-error: true   # no bumpable commits since last tag = no-op
        with:
          github_token: ${{ secrets.CZ_TOKEN }}
          changelog: false        # CHANGELOG.md is curated by hand

      - uses: docker/setup-buildx-action@v4.2.0
      - uses: docker/login-action@v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v6.2.0
        id: image
        with:
          images: ghcr.io/${{ github.repository_owner }}/wtc
          tags: |
            type=sha,priority=1000
            # semver tags when a bump happened this run
            type=raw,value=${{ steps.cz.outputs.version }},enable=${{ steps.cz.outputs.version != '' }}
            type=raw,value=v${{ steps.cz.outputs.version }},enable=${{ steps.cz.outputs.version != '' }}
            type=raw,value=latest
      - uses: docker/build-push-action@v7.3.0
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.image.outputs.tags }}
          labels: ${{ steps.image.outputs.labels }}
          cache-from: type=gha,scope=wtc
          cache-to: type=gha,mode=max,scope=wtc
          build-args: |
            VERSION=${{ steps.cz.outputs.version != '' && format('v{0}', steps.cz.outputs.version) || format('sha-{0}', github.sha) }}
