name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: go build ./...
      - run: go vet ./...
      - run: go test ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: golangci/golangci-lint-action@v9
        with:
          version: latest

  ui:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - run: npm ci
      # The typed client is generated from the Go server's OpenAPI spec and
      # committed. Fail if it drifted from the spec (mirror of the backend's
      # TestOpenAPINoDrift on the frontend side).
      - name: verify generated API client is current
        run: |
          npm run gen:api
          git diff --exit-code src/api/schema.ts || {
            echo "::error::src/api/schema.ts is stale — run 'npm run gen:api' and commit it"; exit 1;
          }
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build

  commits:
    # Conventional-commit check via commitizen (same ruleset as the release
    # bump, cz_conventional_commits). PR-only: on main the commits are already
    # merged. Validates every commit in the PR range.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - run: pip install commitizen
      - name: check conventional commits
        run: cz check --rev-range ${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}
