name: release

# Cut a wtc release: commitizen bumps the version (tag vX.Y.Z, commit updates
# .cz.yaml + Helm appVersion), then the versioned image is built and pushed.
# Manual by design — see .cz.yaml for why this isn't auto-on-merge.

on:
  workflow_dispatch:
    inputs:
      increment:
        description: "Force increment (leave blank to auto-detect from commits)"
        required: false
        type: choice
        default: ""
        options: ["", PATCH, MINOR, MAJOR]

permissions:
  contents: write   # commitizen pushes the bump commit + tag
  packages: write   # GHCR push

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
        with:
          ref: main
          fetch-depth: 0     # cz needs full history + tags
          # The PAT must be the checkout credential — actions/checkout
          # persists it as http.extraheader, overriding any push-URL token.
          token: ${{ secrets.CZ_TOKEN }}

      - name: bump version
        id: cz
        uses: commitizen-tools/commitizen-action@0.27.1
        with:
          github_token: ${{ secrets.CZ_TOKEN }}
          increment: ${{ inputs.increment }}
          changelog: false          # CHANGELOG.md is curated by hand

      - uses: docker/setup-buildx-action@v4.2.0
      - uses: docker/login-action@v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v6.1.0
        id: image
        with:
          images: ghcr.io/${{ github.repository_owner }}/wtc
          tags: |
            type=raw,value=${{ steps.cz.outputs.version }}
            type=raw,value=v${{ steps.cz.outputs.version }}
            type=raw,value=latest

      - uses: docker/build-push-action@v7.3.0
        with:
          context: .
          push: true
          tags: ${{ steps.image.outputs.tags }}
          labels: ${{ steps.image.outputs.labels }}
          cache-from: type=gha,scope=wtc
          build-args: |
            VERSION=v${{ steps.cz.outputs.version }}

      - name: summary
        run: echo "Released wtc v${{ steps.cz.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
