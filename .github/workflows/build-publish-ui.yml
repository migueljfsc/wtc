name: build-publish-ui

# Portal SPA image, with its OWN commitizen lifecycle (ui/.cz.yaml, tags
# wtc-ui-vX.Y.Z) — independent of the wtc binary's version, mirroring the demo
# services. On a main push touching ui/: cz bumps the ui version ([skip ci]),
# then builds/pushes the multi-arch wtc-ui image. cz can't scope commits by
# path, so the `paths` filter is what keeps the ui bump scoped to ui/ changes.
on:
  push:
    branches: [main]
    paths:
      - 'ui/**'
  workflow_dispatch:

permissions:
  contents: write   # commitizen pushes the bump commit + tag
  packages: write   # GHCR push

concurrency:
  group: release          # serialize main-push bumps with build-publish.yml
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: main       # a branch, not the detached trigger sha — cz needs
          fetch-depth: 0  # to be ON main to commit/push the bump
          # checkout persists this credential as http.extraheader, overriding
          # any token cz puts in its push URL — so the PAT must be THE checkout
          # credential, or pushes authenticate as the bot (GH013 under the ruleset).
          token: ${{ secrets.CZ_TOKEN }}

      - name: bump ui version
        id: cz
        if: github.event_name == 'push'
        uses: commitizen-tools/commitizen-action@0.27.1
        continue-on-error: true       # cz exits nonzero when nothing to bump
        with:
          github_token: ${{ secrets.CZ_TOKEN }}
          working_directory: ui       # read ui/.cz.yaml (tags wtc-ui-vX.Y.Z)
          changelog: false

      - uses: docker/setup-buildx-action@v4.2.0
      - uses: docker/login-action@v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v6.2.0
        id: image
        with:
          images: ghcr.io/${{ github.repository_owner }}/wtc-ui
          tags: |
            type=sha,priority=1000
            # semver tags when a bump happened this run
            type=raw,value=${{ steps.cz.outputs.version }},enable=${{ steps.cz.outputs.version != '' }}
            type=raw,value=v${{ steps.cz.outputs.version }},enable=${{ steps.cz.outputs.version != '' }}
            type=raw,value=latest
      - uses: docker/build-push-action@v7.3.0
        with:
          context: ui
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.image.outputs.tags }}
          labels: ${{ steps.image.outputs.labels }}
          cache-from: type=gha,scope=wtc-ui
          cache-to: type=gha,mode=max,scope=wtc-ui
