version: 2

updates:
  # Go modules (root). The demo/ services are separate modules, left out to
  # keep PR volume low; add "/demo/*" here if they need tracking too.
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: chore
      include: scope
    # Only propose a version that has been public for >=7 days — skip
    # same-week releases that may still get yanked or patched.
    cooldown:
      default-days: 7
    groups:
      go-deps:
        patterns:
          - "*"

  # GitHub Actions across .github/workflows (ci, build-publish*, demo-*). This
  # is what keeps actions off deprecated runtimes — e.g. the checkout/setup-go
  # Node 20 notice that surfaced on the v0.3.0 release run.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: ci
      include: scope
    cooldown:
      default-days: 7
    groups:
      actions:
        patterns:
          - "*"

  # Container base images (root Dockerfile, the three demo service images, and
  # the portal ui/ Dockerfile: node:<ver>-alpine + nginx:<ver>-alpine).
  - package-ecosystem: docker
    directories:
      - "/"
      - "/demo/*"
      - "/ui"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: chore
      include: scope
    cooldown:
      default-days: 7
    groups:
      docker:
        patterns:
          - "*"

  # Portal SPA npm dependencies (ui/). Grouped into one PR to keep volume low.
  - package-ecosystem: npm
    directory: /ui
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: chore
      include: scope
    cooldown:
      default-days: 7
    groups:
      npm:
        patterns:
          - "*"
