# Postgres-backed wtc (P15): compose overlay making the wtc container
# stateless — the ledger lives in the postgres service's volume instead of the
# wtc-data volume. Usage (next to a wtc.yaml, same as the base file):
#
#   WTC_PG_PASSWORD=change-me docker compose \
#     -f docker-compose.yaml -f docker-compose.postgres.yaml up -d
#
# The overlay sets WTC_STORAGE_* env overrides, so wtc.yaml needs no storage
# section. To migrate an existing sqlite ledger first, run (wtc stopped):
#
#   wtc migrate --from /data/wtc.db --to "$DSN"       # see docs/setup/postgres.md
services:
  wtc:
    environment:
      WTC_STORAGE_BACKEND: postgres
      WTC_STORAGE_DSN: postgres://wtc:${WTC_PG_PASSWORD:?set WTC_PG_PASSWORD}@postgres:5432/wtc?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: wtc
      POSTGRES_DB: wtc
      POSTGRES_PASSWORD: ${WTC_PG_PASSWORD:?set WTC_PG_PASSWORD}
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "wtc", "-d", "wtc"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  pg-data:
