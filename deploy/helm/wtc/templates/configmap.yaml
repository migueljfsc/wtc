{{- /*
When storage.backend=postgres the chart injects the storage section here
rather than via env, so the DSN can carry a ${WTC_PG_PASSWORD} reference that
wtc's own config loader expands at startup (unset variable = fatal). Bundled
postgres → assembled DSN pointing at the StatefulSet; external → the operator's
url verbatim (may itself contain ${VAR} references), or nothing at all when the
whole DSN comes from the existingSecret as WTC_STORAGE_DSN (env override).
Do not hand-write a storage: section under .Values.config — this wins.
*/ -}}
{{- $config := deepCopy .Values.config }}
{{- if eq .Values.storage.backend "postgres" }}
  {{- $dsn := "" }}
  {{- if .Values.postgresql.enabled }}
    {{- $dsn = printf "postgres://%s:${WTC_PG_PASSWORD}@%s-postgresql:5432/%s?sslmode=disable" .Values.postgresql.auth.username .Release.Name .Values.postgresql.auth.database }}
  {{- else if .Values.storage.externalDatabase.url }}
    {{- $dsn = .Values.storage.externalDatabase.url }}
  {{- end }}
  {{- $storage := dict "backend" "postgres" }}
  {{- if $dsn }}{{- $_ := set $storage "dsn" $dsn }}{{- end }}
  {{- $_ := set $config "storage" $storage }}
{{- end }}
{{- /*
metrics.port opens the separate UNAUTHENTICATED metrics listener. The port is
chart-owned (it must match the containerPort and Service port), so the chart —
not the operator's .Values.config — sets metrics.listen. This wins over any
hand-written metrics: section, same as storage above.
*/ -}}
{{- if .Values.metrics.port }}
  {{- $_ := set $config "metrics" (dict "listen" (printf ":%v" .Values.metrics.port)) }}
{{- end }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-config
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
data:
  wtc.yaml: |
{{ toYaml $config | indent 4 }}
