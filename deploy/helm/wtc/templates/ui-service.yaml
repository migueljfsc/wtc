{{- if .Values.ui.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-ui
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}-ui
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  type: {{ .Values.ui.service.type }}
  ports:
    - port: {{ .Values.ui.service.port }}
      targetPort: http
      name: http
  selector:
    app.kubernetes.io/name: {{ .Chart.Name }}-ui
    app.kubernetes.io/instance: {{ .Release.Name }}
{{- end }}
