{{- if .Values.metrics.serviceMonitor.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ .Release.Name }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    {{- with .Values.metrics.serviceMonitor.labels }}
{{ toYaml . | indent 4 }}
    {{- end }}
spec:
  selector:
    matchLabels:
      # Matches only the API Service — the ui Service carries name "wtc-ui".
      app.kubernetes.io/name: {{ .Chart.Name }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  endpoints:
    {{- if .Values.metrics.port }}
    # Separate unauthenticated metrics listener (metrics.port) — no credentials.
    - port: metrics
      path: /metrics
      interval: {{ .Values.metrics.serviceMonitor.interval }}
    {{- else }}
    # Main port: /metrics is bearer-authed with api_tokens; the scrape reuses
    # the operator Secret's WTC_API_TOKEN key.
    - port: http
      path: /metrics
      interval: {{ .Values.metrics.serviceMonitor.interval }}
      authorization:
        type: Bearer
        credentials:
          name: {{ required "metrics.serviceMonitor on the main port needs existingSecret (key WTC_API_TOKEN) for the scrape's bearer auth — or set metrics.port for the unauthenticated listener" .Values.existingSecret }}
          key: WTC_API_TOKEN
    {{- end }}
{{- end }}
