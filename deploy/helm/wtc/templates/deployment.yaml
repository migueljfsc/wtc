apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
{{- $pg := eq .Values.storage.backend "postgres" }}
spec:
  replicas: 1                # single writer + per-pod pollers — never scale this
  strategy:
    {{- if $pg }}
    type: RollingUpdate      # stateless pod (P15): no volume pins the rollout
    {{- else }}
    type: Recreate           # RWO volume + single writer: no rolling overlap
    {{- end }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Chart.Name }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Chart.Name }}
        app.kubernetes.io/instance: {{ .Release.Name }}
      annotations:
        checksum/config: {{ toYaml .Values.config | sha256sum }}
        {{- if and .Values.metrics.scrapeAnnotations .Values.metrics.port }}
        prometheus.io/scrape: "true"
        prometheus.io/port: {{ .Values.metrics.port | quote }}
        prometheus.io/path: /metrics
        {{- end }}
    spec:
      {{- if .Values.postgresql.enabled }}
      # Hold wtc until the bundled postgres accepts connections, so first boot
      # doesn't burn restart backoffs racing the database.
      initContainers:
        - name: wait-for-postgresql
          image: {{ .Values.postgresql.image }}
          command:
            - sh
            - -c
            - until pg_isready -h {{ .Release.Name }}-postgresql -U {{ .Values.postgresql.auth.username }}; do echo waiting for postgresql; sleep 2; done
      {{- end }}
      containers:
        - name: wtc
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["serve", "--config", "/etc/wtc/wtc.yaml"]
          ports:
            - name: http
              containerPort: 8484
            {{- with .Values.metrics.port }}
            - name: metrics
              containerPort: {{ . }}
            {{- end }}
          {{- with .Values.existingSecret }}
          envFrom:
            - secretRef:
                name: {{ . }}
          {{- end }}
          {{- $pgChartManaged := and .Values.postgresql.enabled (ne .Values.postgresql.auth.password "") }}
          {{- if or $pgChartManaged .Values.env }}
          env:
            {{- if $pgChartManaged }}
            # Chart-managed bundled-postgres password. The ConfigMap DSN
            # references ${WTC_PG_PASSWORD}; wtc's loader expands it at
            # startup. With existingSecret instead, the same variable arrives
            # via envFrom (opinionated key WTC_PG_PASSWORD) and this entry is
            # not rendered.
            - name: WTC_PG_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-postgresql
                  key: password
            {{- end }}
            {{- with .Values.env }}
{{ toYaml . | indent 12 }}
            {{- end }}
          {{- end }}
          livenessProbe:
            httpGet: {path: /healthz, port: http}
          readinessProbe:
            httpGet: {path: /healthz, port: http}
          resources:
{{ toYaml .Values.resources | indent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/wtc
            {{- if not $pg }}
            - name: data
              mountPath: /data
            {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ .Release.Name }}-config
        {{- if not $pg }}
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-data
          {{- else }}
          emptyDir: {}
          {{- end }}
        {{- end }}
