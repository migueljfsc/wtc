image:
  repository: ghcr.io/migueljfsc/wtc
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8484

# SQLite lives here. Single writer => single replica + Recreate strategy;
# do not scale this chart horizontally.
persistence:
  enabled: true
  size: 1Gi
  storageClass: ""

# Name of an existing Secret whose keys become env vars, e.g.
# WTC_API_TOKEN, WTC_GH_API_TOKEN, WTC_FLUX_HMAC_KEY, WTC_GH_WEBHOOK_SECRET.
# The config below references them with ${VAR}.
existingSecret: ""

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    memory: 256Mi

# Rendered verbatim to /etc/wtc/wtc.yaml — see docs/SPEC.md §2.
# NOTE: ${VAR} references resolve from the pod environment at startup and an
# UNSET variable is a fatal config error (by design — a silently empty db
# path once meant data loss). Only reference variables that existingSecret
# actually provides. The default below boots without any secret: the API
# rejects everything until auth.api_tokens is configured.
config:
  server:
    listen: ":8484"
    db: /data/wtc.db
    # cors:                          # required when ui.enabled and the SPA is
    #   allowed_origins:             # served from a different origin than the API
    #     - https://wtc-portal.example.com
  # auth:
  #   api_tokens:
  #     - ${WTC_API_TOKEN}          # requires existingSecret with this key
  # sources:
  #   flux:
  #     hmac_key: ${WTC_FLUX_HMAC_KEY}
  #     suppression_window: 10m

# Portal SPA (P7+). Optional and additive — the Go binary is the backend
# either way. When enabled, add the origin the SPA is served from to
# config.server.cors.allowed_origins above, since the browser calls the API
# cross-origin (or front both with one ingress host and leave apiBaseUrl empty).
ui:
  enabled: false
  image:
    repository: ghcr.io/migueljfsc/wtc-ui
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 80
  # Browser-facing wtc API URL (what the user's browser calls — e.g. the API
  # ingress host). Empty => same origin, for reverse-proxy/single-host setups.
  apiBaseUrl: ""
  replicas: 1
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      memory: 128Mi
