image:
  repository: ghcr.io/migueljfsc/wtc
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8484

# Storage backend (P15). sqlite (default) keeps the ledger on the PVC below —
# single replica + Recreate strategy. postgres makes the wtc pod STATELESS:
# the PVC is dropped and upgrades roll. Either bundle a postgres pod
# (postgresql.enabled below) or point externalDatabase.url at your own
# (RDS, CloudNativePG, ...). Single replica either way — pollers, suppression
# windows and the digest are per-pod.
storage:
  backend: sqlite          # sqlite | postgres
  # Used when backend=postgres and postgresql.enabled=false (bring-your-own
  # DB). Rendered into wtc.yaml, so it may reference ${VAR}s the existingSecret
  # provides (e.g. "postgres://wtc:${WTC_DB_PASSWORD}@rds:5432/wtc"). Leave it
  # EMPTY to supply the whole DSN out-of-band as the existingSecret key
  # WTC_STORAGE_DSN instead. The localhost default is a placeholder.
  externalDatabase:
    url: "postgres://wtc:wtc@localhost:5432/wtc?sslmode=disable"

# Bundled postgres pod (used when storage.backend=postgres). Minimal
# single-node StatefulSet — for managed/HA postgres use externalDatabase
# instead. Password, one of:
#   1. auth.password — quick path; the chart manages the Secret.
#   2. existingSecret (below) with key WTC_PG_PASSWORD — operator-managed.
# Either way wtc's DSN is rendered into the ConfigMap referencing
# ${WTC_PG_PASSWORD}; wtc expands it at startup (unset = fatal). Passwords go
# into a URL — stick to URL-safe characters.
postgresql:
  enabled: false
  image: postgres:16-alpine
  auth:
    username: wtc
    password: ""
    database: wtc
  persistence:
    size: 5Gi
    storageClass: ""
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      memory: 512Mi

# SQLite lives here (storage.backend=sqlite only). Single writer => single
# replica + Recreate strategy; do not scale this chart horizontally.
persistence:
  enabled: true
  size: 1Gi
  storageClass: ""

# Two ways to inject secrets — use either or both:
#
# 1. existingSecret: ONE operator-managed Secret for everything — API tokens,
#    source credentials, AND database auth. Its keys become env vars verbatim
#    (envFrom); the config references them as ${VAR}. Opinionated key names
#    (all optional — provide what your setup uses):
#      WTC_API_TOKEN               bearer token for /api/* and /ingest/generic
#      WTC_GH_API_TOKEN            github poller PAT
#      WTC_GH_WEBHOOK_SECRET       /ingest/github HMAC secret
#      WTC_GITLAB_API_TOKEN        gitlab poller token
#      WTC_GITLAB_WEBHOOK_SECRET   /ingest/gitlab X-Gitlab-Token
#      WTC_FLUX_HMAC_KEY           flux generic-hmac shared key
#      WTC_ARGOCD_WEBHOOK_SECRET   /ingest/argocd X-WTC-Token
#      WTC_SLACK_WEBHOOK           digest incoming-webhook URL
#      WTC_PG_PASSWORD             bundled postgres password (postgresql.enabled)
#      WTC_STORAGE_DSN             full DSN for an external database
#    e.g. kubectl create secret generic wtc-secrets \
#           --from-literal=WTC_API_TOKEN=... --from-literal=WTC_PG_PASSWORD=...
existingSecret: ""
#
# 2. env: explicit container env vars, so you can pull each value from ANY
#    existing Secret + key (secretKeyRef) without renaming its keys. The config
#    still uses the ${VAR} name (or, for source tokens, the WTC_* env override
#    sets the value directly and you can drop the ${VAR} line entirely). E.g.:
# env:
#   - name: WTC_GH_API_TOKEN
#     valueFrom:
#       secretKeyRef:
#         name: github-credentials
#         key: token
#   - name: WTC_API_TOKEN
#     valueFrom:
#       secretKeyRef:
#         name: wtc-api-token
#         key: token
env: []

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    memory: 256Mi

# Prometheus metrics (P16). /metrics is always served on the main port,
# bearer-authed with api_tokens. Two scrape models:
#   1. port: 0 — scrape the MAIN port with bearer auth. The ServiceMonitor
#      pulls credentials from existingSecret key WTC_API_TOKEN (required for
#      serviceMonitor.enabled in this model). Note an api_token also grants
#      /api/* including config writes — fine when you trust Prometheus,
#      otherwise use model 2.
#   2. port: <n> (shipped default 9091) — wtc opens a second UNAUTHENTICATED
#      listener serving only /metrics; the chart exposes it as the "metrics"
#      port (ClusterIP → in-cluster only) and the ServiceMonitor scrapes it
#      without credentials. Keep it in-cluster (NetworkPolicy) — never route it
#      through the ingress. Set to 0 to serve metrics on the main port only.
metrics:
  port: 9091
  # ServiceMonitor for the Prometheus Operator / kube-prometheus-stack.
  serviceMonitor:
    enabled: false
    interval: 30s
    # Extra labels for Prometheus discovery, e.g. {release: kube-prometheus-stack}.
    labels: {}
  # prometheus.io/* pod annotations for annotation-based discovery instead of
  # a ServiceMonitor. Only rendered when metrics.port is set — annotation
  # scrapes cannot carry bearer auth.
  scrapeAnnotations: false

# Rendered verbatim to /etc/wtc/wtc.yaml — see docs/SPEC.md §2.
# NOTE: ${VAR} references resolve from the pod environment at startup and an
# UNSET variable is a fatal config error (by design — a silently empty db
# path once meant data loss). Only reference variables that existingSecret
# actually provides. The default below boots without any secret: the API
# rejects everything until auth.api_tokens is configured.
config:
  server:
    listen: ":8484"
    db: /data/wtc.db
    # cors:                          # required when ui.enabled and the SPA is
    #   allowed_origins:             # served from a different origin than the API
    #     - https://wtc-portal.example.com
  # auth:
  #   api_tokens:
  #     - ${WTC_API_TOKEN}          # requires existingSecret with this key
  # sources:
  #   flux:
  #     hmac_key: ${WTC_FLUX_HMAC_KEY}
  #     suppression_window: 10m

# Portal SPA (P7+). Deployed by default alongside the API. With the bundled
# ingress below, the browser loads the SPA and calls the API on the SAME origin
# (the ingress routes /api to wtc), so apiBaseUrl stays empty and no CORS is
# needed. To instead serve the SPA on a DIFFERENT origin from the API, set
# apiBaseUrl to the API's URL and add that SPA origin to
# config.server.cors.allowed_origins above.
ui:
  enabled: true
  image:
    repository: ghcr.io/migueljfsc/wtc-ui
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 80
  # Browser-facing wtc API URL. Empty => same origin (works with the ingress
  # below, which proxies /api to wtc). Set it only for the cross-origin model.
  apiBaseUrl: ""
  replicas: 1
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      memory: 128Mi

# Optional single-host ingress: serves the portal at / and proxies /api to the
# wtc API on the same origin (no CORS). Enable it and set host to expose the
# portal; k8s probes hit the pods directly, so health isn't routed here.
ingress:
  enabled: false
  className: ""            # e.g. "nginx"
  host: wtc.example.com
  annotations: {}
  tls: []                  # e.g. [{ secretName: wtc-tls, hosts: [wtc.example.com] }]
